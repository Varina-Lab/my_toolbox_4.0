name: Build Go Tool
on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục tool trong go/'
        required: true
        default: '_template'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '^1.25'
          
      - name: Build Standalone EXE
        working-directory: go/${{ github.event.inputs.tool_name }}
        run: go build -ldflags="-s -w" -o ${{ github.event.inputs.tool_name }}.exe main.go
        
      - name: Compress binary with UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: go/${{ github.event.inputs.tool_name }}/${{ github.event.inputs.tool_name }}.exe
          args: -9
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.tool_name }}_go_amd64.exe
          path: go/${{ github.event.inputs.tool_name }}/${{ github.event.inputs.tool_name }}.exe
