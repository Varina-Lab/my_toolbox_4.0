name: Build Assembly Tool
on:
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tên thư mục tool trong assembly/'
        required: true
        default: '_template'

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Compile and Link Assembly (Pure Win32)
        working-directory: assembly/${{ github.event.inputs.tool_name }}
        run: |
          # Dịch mã ASM thành Object file
          ml64.exe /c /Cx /W3 main.asm
          
          # Liên kết thành EXE Độc lập: CHỈ dùng kernel32.lib và user32.lib (Không có C-Runtime)
          # Chỉ định điểm vào (ENTRY) là main để bỏ qua mọi hàm khởi tạo thừa thãi
          link.exe main.obj /SUBSYSTEM:CONSOLE /MACHINE:X64 /ENTRY:main /OUT:"${{ github.event.inputs.tool_name }}.exe" kernel32.lib user32.lib
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.tool_name }}_asm_amd64.exe
          path: assembly/${{ github.event.inputs.tool_name }}/${{ github.event.inputs.tool_name }}.exe